name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  lint-php:
    name: Lint PHP configs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: PHP Lint
      uses: voc/PHP-Lint@v1.0.0

  validate-jsons:
    name: Validate JSON configs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Validate json files
      uses: dsanders11/json-schema-validate-action@v2.0.0
      with:
        schema: docs/config-schema.json
        files: configs/conferences/**/config.json
